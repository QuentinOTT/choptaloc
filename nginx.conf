resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name choptaloc.fr www.choptaloc.fr;

    # Rediriger HTTP vers HTTPS (après obtention du certificat SSL)
    # Pour l'instant, servir en HTTP pendant la configuration
    # return 301 https://$host$request_uri;

    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        set $backend_upstream http://backend:3000/api/;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Location pour le challenge ACME de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

