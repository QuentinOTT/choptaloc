upstream frontend {
    server 10.0.4.4:80;
}

upstream backend {
    server backend:3000;
}

server {
    listen 80;
    server_name choptaloc.fr www.choptaloc.fr;

    # Rediriger HTTP vers HTTPS (après obtention du certificat SSL)
    # Pour l'instant, servir en HTTP pendant la configuration
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Location pour le challenge ACME de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

