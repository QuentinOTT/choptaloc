version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: choptaloc-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT:-3306}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-choptaloc_secret_key_2026}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
